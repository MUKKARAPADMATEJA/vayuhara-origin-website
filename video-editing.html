<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Editing | VAYUHARA ORIGIN</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-white);
        }
        h1 {
            font-family: 'Sora', sans-serif;
        }
        .back-btn {
            position: fixed;
            top: 2rem;
            left: 2rem;
            padding: 1rem 2rem;
            background: var(--primary);
            color: white;
            border-radius: 8px;
            font-weight: 500;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: var(--transition);
            z-index: 1000;
        }
        .back-btn:hover {
            transform: translateX(-5px);
            background: var(--accent);
        }
    </style>
</head>
<body>

    <a href="index.html#portfolio" class="back-btn">
        <i class="fas fa-arrow-left"></i> Back to Works
    </a>

    <section style="padding: 120px 8%; min-height: 100vh;">
        <div style="text-align: center; margin-bottom: 60px;">
            <i class="fas fa-film" style="font-size: 4rem; color: var(--accent); margin-bottom: 1.5rem;"></i>
            <h1 style="font-size: 3rem; color: var(--primary); margin-bottom: 1rem;">Video Editing</h1>
            <div class="accent-line" style="margin: 0 auto;"></div>
        </div>

        <div class="portfolio-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px;">
            <div class="work-item" style="border-radius: 15px; overflow: hidden; aspect-ratio: 16/9; background: #000;">
                <video src="video_edit_2.mp4" controls style="width: 100%; height: 100%; object-fit: cover;"></video>
            </div>
            <div class="work-item" style="border-radius: 15px; overflow: hidden; aspect-ratio: 16/9; background: #000;">
                <video src="video_edit_3.mp4" controls style="width: 100%; height: 100%; object-fit: cover;"></video>
            </div>
            <div class="work-item" style="border-radius: 15px; overflow: hidden; aspect-ratio: 16/9; background: #000;">
                <video src="video_edit_4.mp4" controls style="width: 100%; height: 100%; object-fit: cover;"></video>
            </div>
            <div class="work-item" style="border-radius: 15px; overflow: hidden; aspect-ratio: 16/9; background: #000;">
                <video src="video_edit_5.mp4" controls style="width: 100%; height: 100%; object-fit: cover;"></video>
            </div>
        </div>
    </section>

    <!-- Custom JS -->
    <script src="main.js"></script>
</body>
</html>
