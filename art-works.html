    <script>
        function openLightbox(src) {
            const lb = document.createElement('div');
            lb.style.cssText = `position: fixed; inset: 0; background: rgba(11, 18, 32, 0.95); z-index: 10000; display: flex; align-items: center; justify-content: center; cursor: zoom-out; opacity: 0; transition: opacity 0.3s ease;`;
            lb.innerHTML = `<img src="${src}" style="max-width: 90%; max-height: 90%; border-radius: 10px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);">`;
            lb.onclick = () => {
                lb.style.opacity = '0';
                setTimeout(() => lb.remove(), 300);
            };
            document.body.appendChild(lb);
            setTimeout(() => lb.style.opacity = '1', 10);
        }
    </script>
